<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Assistant Settings</title>
    <style>
        :root {
            --primary: #2196f3;
            --primary-dark: #1976d2;
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #e0e0e0;
            --success: #4caf50;
            --error: #f44336;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --surface: #2d2d2d;
                --text: #e0e0e0;
                --text-secondary: #aaa;
                --border: #444;
            }
        }

        body {
            width: 420px;
            padding: 20px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        h2 {
            margin: 0 0 20px 0;
            color: var(--primary);
            font-size: 20px;
        }

        .setting-group {
            margin: 16px 0;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .setting-group h3 {
            margin: 0 0 12px 0;
            font-size: 15px;
            color: var(--text);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 13px;
        }

        select,
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0;
        }

        .toggle-row label {
            margin: 0;
            font-weight: 400;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .save-section {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn.save {
            background: var(--primary);
            color: white;
        }

        .btn.save:hover {
            background: var(--primary-dark);
        }

        .btn.reset {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn.reset:hover {
            background: var(--border);
        }

        .message {
            padding: 10px 14px;
            margin: 12px 0;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
            display: block;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
            display: block;
        }

        .api-note {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            line-height: 1.4;
        }
    </style>
  <script type="module" crossorigin src="/assets/settings.html-Cjk2X_Ss.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-CSRv37U6.js">
</head>

<body>
    <h2>⚙️ Settings</h2>

    <div id="message" class="message"></div>

    <div class="setting-group">
        <h3>🔑 AI Provider</h3>
        <label for="provider">API Provider:</label>
        <select id="provider">
            <option value="openai">OpenAI (GPT-4o)</option>
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="local">Local / Custom Endpoint</option>
        </select>

        <label for="apiKey" style="margin-top: 12px;">API Key:</label>
        <input type="password" id="apiKey" placeholder="sk-... or your key">
        <div class="api-note">
            🔒 Your key is stored locally and never sent to our servers.
        </div>

        <div id="endpointContainer">
            <label for="endpoint" style="margin-top: 12px;">Custom Endpoint (optional):</label>
            <input type="text" id="endpoint" placeholder="https://your-api.com/v1/chat">
        </div>
    </div>

    <div class="setting-group">
        <h3>👤 Defaults</h3>
        <label for="defaultExperience">Experience Level:</label>
        <select id="defaultExperience">
            <option value="beginner">🌱 Beginner</option>
            <option value="intermediate">🌿 Intermediate</option>
            <option value="advanced">🌳 Advanced</option>
        </select>

        <label for="defaultDepth" style="margin-top: 12px;">Help Depth:</label>
        <select id="defaultDepth">
            <option value="surface">🌊 Surface Level</option>
            <option value="deep">🏊 Deep Dive</option>
        </select>
    </div>

    <div class="setting-group">
        <h3>⚡ Behavior</h3>
        <div class="toggle-row">
            <label for="enabled">Enable Extension</label>
            <input type="checkbox" id="enabled" checked>
        </div>
        <div class="toggle-row">
            <label for="autoSuggest">Auto-suggest while typing</label>
            <input type="checkbox" id="autoSuggest" checked>
        </div>
        <div class="toggle-row">
            <label for="darkMode">Follow system dark mode</label>
            <input type="checkbox" id="darkMode" checked>
        </div>
    </div>

    <div class="save-section">
        <button class="btn reset" id="resetBtn">↺ Reset</button>
        <button class="btn save" id="saveBtn">💾 Save Settings</button>
    </div>

</body>

</html>
