<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Assistant</title>
    <style>
        :root {
            --primary: #2196f3;
            --primary-dark: #1976d2;
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #e0e0e0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --surface: #2d2d2d;
                --text: #e0e0e0;
                --text-secondary: #aaa;
                --border: #444;
            }
        }

        body {
            width: 320px;
            padding: 16px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        h1 {
            font-size: 18px;
            margin: 0 0 12px 0;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status {
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 12px 0;
            font-size: 14px;
            line-height: 1.4;
        }

        .stats {
            margin: 12px 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .btn {
            width: 100%;
            padding: 10px 16px;
            margin: 6px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn.primary {
            background: var(--primary);
            color: white;
        }

        .btn.primary:hover {
            background: var(--primary-dark);
        }

        .btn.secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn.secondary:hover {
            background: var(--border);
        }

        .footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>✨ Prompt Assistant</h1>

    <div class="status" id="status">
        🔍 Ready! Focus any text input to start improving prompts.
    </div>

    <div class="stats" id="stats">
        Prompts improved: <strong id="count">0</strong>
    </div>

    <button class="btn primary" id="settingsBtn">
        ⚙️ Settings
    </button>
    <button class="btn secondary" id="docsBtn">
        📖 Quick Guide
    </button>
    <button class="btn secondary" id="feedbackBtn">
        💬 Send Feedback
    </button>

    <div class="footer">
        v1.0.0 • Made with ❤️
    </div>

    <script type="module" src="popup.js"></script>
</body>

</html>
